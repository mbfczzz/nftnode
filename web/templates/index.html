<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nftables 转发管理面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d28;
            --bg-card: #22263a;
            --bg-input: #2a2e42;
            --border: rgba(255,255,255,0.06);
            --text-primary: #e4e6ef;
            --text-secondary: #8b8fa3;
            --accent: #7c5cf7;
            --accent-hover: #6c63ff;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* --- Header --- */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .status-badge.running {
            background: rgba(34,197,94,0.1);
            color: var(--success);
            border: 1px solid rgba(34,197,94,0.2);
        }
        .status-badge.stopped {
            background: rgba(239,68,68,0.1);
            color: var(--danger);
            border: 1px solid rgba(239,68,68,0.2);
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .status-badge.running .status-dot { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-badge.stopped .status-dot { background: var(--danger); }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 4px 15px rgba(124,92,247,0.3); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { box-shadow: 0 4px 15px rgba(239,68,68,0.3); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-secondary);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* --- Main --- */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 24px;
        }

        /* --- Service Controls --- */
        .service-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        /* --- Card --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-body { padding: 20px; }

        /* --- Table --- */
        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tbody td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tbody tr:hover { background: rgba(124,92,247,0.04); }
        tbody tr:last-child td { border-bottom: none; }
        .empty-row td {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 16px;
        }

        /* --- Pagination --- */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .pagination-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pagination select {
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 4px 8px;
            font-size: 13px;
        }

        /* --- Form --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            align-items: end;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group input::placeholder, .form-group textarea::placeholder {
            color: rgba(255,255,255,0.2);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.5;
        }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            max-width: 400px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .toast.success { background: var(--success); color: #fff; }
        .toast.error { background: var(--danger); color: #fff; }
        .toast.info { background: var(--accent); color: #fff; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* --- IPv6 Tag --- */
        .ip-tag {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }
        .ip-tag.v4 { background: rgba(34,197,94,0.15); color: var(--success); }
        .ip-tag.v6 { background: rgba(124,92,247,0.15); color: var(--accent); }

        /* --- Protocol Toggle --- */
        .protocol-toggle {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
        }
        .protocol-toggle .toggle-btn {
            padding: 10px 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: var(--bg-input);
            color: var(--text-secondary);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .protocol-toggle .toggle-btn:not(:last-child) {
            border-right: 1px solid rgba(255,255,255,0.06);
        }
        .protocol-toggle .toggle-btn.active-v4 {
            background: linear-gradient(135deg, rgba(34,197,94,0.2), rgba(34,197,94,0.08));
            color: var(--success);
            box-shadow: inset 0 -2px 0 var(--success);
        }
        .protocol-toggle .toggle-btn.active-v6 {
            background: linear-gradient(135deg, rgba(124,92,247,0.2), rgba(124,92,247,0.08));
            color: var(--accent);
            box-shadow: inset 0 -2px 0 var(--accent);
        }
        .protocol-toggle .toggle-btn:hover:not(.active-v4):not(.active-v6) {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .ipv6-notice {
            background: rgba(124,92,247,0.08);
            border: 1px solid rgba(124,92,247,0.2);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 14px;
            display: none;
        }
        .ipv6-notice.show { display: block; }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .header { padding: 0 16px; }
            .main { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
            .service-controls { gap: 6px; }
            .btn { padding: 7px 12px; font-size: 12px; }
            .protocol-toggle .toggle-btn { padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>🔀 nftables 转发管理面板</h1>
        <div class="header-right">
            <div class="status-badge stopped" id="statusBadge">
                <div class="status-dot"></div>
                <span id="statusText">检测中...</span>
            </div>
            <button class="btn btn-outline btn-sm" id="logoutBtn">退出登录</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Service Controls -->
        <div class="service-controls">
            <button class="btn btn-success" id="startBtn">▶ 启动</button>
            <button class="btn btn-danger" id="stopBtn">⏹ 停止</button>
            <button class="btn btn-warning" id="restartBtn">🔄 重启</button>
        </div>

        <!-- Rules Table -->
        <div class="card">
            <div class="card-header">
                <h2>📋 转发规则列表</h2>
                <span style="font-size:13px;color:var(--text-secondary)" id="ruleCount">共 0 条</span>
            </div>
            <div class="table-wrapper">
                <table id="rulesTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>本机端口</th>
                            <th>IP类型</th>
                            <th>目标地址</th>
                            <th>目标端口</th>
                            <th>协议</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="rulesBody">
                        <tr class="empty-row"><td colspan="8">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination">
                <div class="pagination-controls">
                    <span>每页</span>
                    <select id="pageSizeSelect">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                    <span>条</span>
                </div>
                <div class="pagination-controls">
                    <button class="btn btn-outline btn-sm" id="prevPage" disabled>上一页</button>
                    <span id="pageInfo">第 1 / 1 页</span>
                    <button class="btn btn-outline btn-sm" id="nextPage" disabled>下一页</button>
                </div>
            </div>
        </div>

        <!-- Add Single Rule -->
        <div class="card">
            <div class="card-header">
                <h2>➕ 添加转发规则</h2>
            </div>
            <div class="card-body">
                <!-- IPv4/IPv6 Toggle -->
                <div class="protocol-toggle" id="protocolToggle">
                    <button class="toggle-btn active-v4" data-proto="ipv4" id="toggleV4">
                        🌐 IPv4
                    </button>
                    <button class="toggle-btn" data-proto="ipv6" id="toggleV6">
                        🔗 IPv6
                    </button>
                </div>

                <div class="ipv6-notice" id="ipv6Notice">
                    💡 IPv6 地址请使用方括号包裹，例如：<code>[2001:db8::1]</code>  ·  nftables 将使用 <code>inet</code> 表进行双栈转发
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label>本机端口</label>
                        <input type="number" id="localPort" placeholder="如: 2222" min="1" max="65535">
                    </div>
                    <div class="form-group">
                        <label id="addrLabel">目标 IPv4 地址</label>
                        <input type="text" id="remoteAddr" placeholder="如: 6.6.6.6">
                    </div>
                    <div class="form-group">
                        <label>目标端口</label>
                        <input type="number" id="remotePort" placeholder="如: 6666" min="1" max="65535">
                    </div>
                    <div class="form-group">
                        <label>备注（可选）</label>
                        <input type="text" id="ruleNote" placeholder="如: 东京节点">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" id="addRuleBtn" style="margin-top:20px">添加规则</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Batch Add Rules -->
        <div class="card">
            <div class="card-header">
                <h2>📦 批量添加转发规则</h2>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>每行一条规则</label>
                    <textarea id="batchRules" rows="5" placeholder="IPv4: 中转端口:落地IP:目标端口&#10;IPv6: 中转端口:[IPv6地址]:目标端口&#10;&#10;示例:&#10;2222:6.6.6.6:6666&#10;3333:[2001:db8::1]:7777"></textarea>
                </div>
                <div class="form-hint">
                    IPv4 格式：<code>中转端口:落地IP:目标端口</code> &nbsp;|&nbsp;
                    IPv6 格式：<code>中转端口:[IPv6地址]:目标端口</code>
                </div>
                <button class="btn btn-primary" id="batchAddBtn" style="margin-top:14px">批量添加</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
